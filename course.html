<!DOCTYPE html>
<html>
<head>
<title>Courses</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-page="courses">
<div class="sidebar">
<h2>STEM</h2>
<a href="home.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="course.html" class="active">Courses</a>
<a href="teacher.html">Teachers</a>
<a href="admin.html">Admins</a>
<a href="lesson.html">Lessons</a>
<a href="enrollment.html">Enrollments</a>
<a href="progress.html">Progress</a>
<a href="certificate.html">Certificates</a>
</div>
<div class="main">
<div class="header">Courses</div>
<div class="card">
<h3>Add / Edit Course</h3>
<form id="course-form">
<input type="hidden" id="course-code-hidden">
<input id="course-code" placeholder="Course Code (e.g. CS101)" required>
<input id="course-title" placeholder="Course Title" required>
<textarea id="course-desc" placeholder="Description"></textarea>
<select id="course-category">
  <option value="Science">Science</option>
  <option value="Technology">Technology</option>
  <option value="Mathematics">Mathematics</option>
  <option value="Engineering">Engineering</option>
</select>
<select id="course-difficulty">
  <option value="Beginner">Beginner</option>
  <option value="Intermediate">Intermediate</option>
  <option value="Advanced">Advanced</option>
</select>
<input id="course-duration" placeholder="Duration (minutes)" type="number">
<label style="color:#94a3b8;font-size:13px">Start Date</label>
<input id="course-start" type="date">
<label style="color:#94a3b8;font-size:13px">End Date</label>
<input id="course-end" type="date">
<input id="course-max" placeholder="Max Students" type="number">
<input id="course-grade" placeholder="Passing Grade (default 50)" type="number" step="0.01">
<select id="course-teacher"><option value="">--Select Teacher--</option></select>
<select id="course-admin"><option value="">--Select Admin--</option></select>
<button type="submit">Save Course</button>
</form>
</div>
<div class="card">
<h3>Course List</h3>
<table>
<thead><tr><th>Code</th><th>Title</th><th>Category</th><th>Difficulty</th><th>Teacher</th><th>Actions</th></tr></thead>
<tbody id="courses-tbody"><tr><td colspan="6">Loading...</td></tr></tbody>
</table>
</div>
</div>
<script src="app.js"></script>
</body>
</html>
