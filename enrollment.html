<!DOCTYPE html>
<html>
<head>
<title>Enrollments</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-page="enrollments">
<div class="sidebar">
<h2>STEM</h2>
<a href="home.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="course.html">Courses</a>
<a href="teacher.html">Teachers</a>
<a href="admin.html">Admins</a>
<a href="lesson.html">Lessons</a>
<a href="enrollment.html" class="active">Enrollments</a>
<a href="progress.html">Progress</a>
<a href="certificate.html">Certificates</a>
</div>
<div class="main">
<div class="header">Enrollments</div>
<div class="card">
<h3>Enroll Student</h3>
<form id="enrollment-form">
<input type="hidden" id="enrollment-id">
<select id="enrollment-student"><option value="">-- Select Student --</option></select>
<select id="enrollment-course"><option value="">-- Select Course --</option></select>
<div id="update-fields" style="display:none">
  <select id="enrollment-status">
    <option value="Enrolled">Enrolled</option>
    <option value="In Progress">In Progress</option>
    <option value="Completed">Completed</option>
    <option value="Dropped">Dropped</option>
  </select>
  <input id="enrollment-percent" placeholder="Completion %" type="number" step="0.01" min="0" max="100">
  <input id="enrollment-grade" placeholder="Final Grade" type="number" step="0.01" min="0" max="100">
</div>
<button type="submit">Save Enrollment</button>
</form>
</div>
<div class="card">
<h3>Enrollment List</h3>
<table>
  <thead>
    <tr>
        <th>ID</th>
        <th>Student</th>
        <th>Course</th>
        <th>Status</th>
        <th>%</th>         <th>Grade</th>     <th>Enrollment Date</th>
        <th>Actions</th>
    </tr>
</thead>
<tbody id="enrollments-tbody"><tr><td colspan="8">Loading...</td></tr></tbody>
</table>
</div>
</div>
<script src="app.js"></script>
</body>
</html>
