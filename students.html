<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="students">
    <div class="sidebar">
        <h2>STEM</h2>
        <a href="home.html">Dashboard</a>
        <a href="students.html" class="active">Students</a>
        <a href="course.html">Courses</a>
        <a href="teacher.html">Teachers</a>
        <a href="admin.html">Admins</a>
        <a href="lesson.html">Lessons</a>
        <a href="enrollment.html">Enrollments</a>
        <a href="progress.html">Progress</a>
        <a href="certificate.html">Certificates</a>
    </div>

    <div class="main">
        <div class="header">Students Management</div>
        
        <div class="card">
            <h3>Add / Edit Student</h3>
            <form id="student-form">
                <input type="hidden" id="student-id">
                
                <input type="text" id="student-name" placeholder="Full Name" required>
                <input type="email" id="student-email" placeholder="Email Address" required>
                <input type="password" id="student-pwd" placeholder="Password" required>
                
                <button type="button" onclick="togglePwd('student-pwd', this)">Show Password</button>

                <div style="flex-basis: 100%; height: 0;"></div>

                <label style="color:#94a3b8;font-size:13px">Date of Birth</label>
                <input type="date" id="student-dob" required>
                
                <select id="student-gender">
                    <option value="Male" selected>Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                
                <button type="submit">Save Student</button>
            </form>
        </div>

        <div class="card">
            <h3>Registered Students</h3>
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Gender</th><th>DOB</th><th>Registration Date</th><th>Actions</th></tr>
                </thead>
                <tbody id="students-tbody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
